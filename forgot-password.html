<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- icon link -->
    <link rel="icon" href="assets/icon.png" type="image/png">
    <title>ConnectSphere - Forgot Password</title>
    <!-- Google Fonts CDN -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500&amp;display=swap"
        rel="stylesheet" />

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- style files -->
    <link rel="stylesheet" href="css/designsystem.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/module.css">
    <link rel="stylesheet" href="css/state.css">
</head>

<body class="forgot-password-page">
    <div class="container">
        <div class="security_card">
            <div class="security_card_heading">
                <h1 class="security_card_heading_header">ConnectSphere</h1>
                <p class="security_card_heading_text">Enter your email to reset your password</p>
            </div>
            <div id="banner" class="security_card_banner">
                <i id="banner-icon" class="fa-solid fa-envelope"></i>
                <span id="banner-text"></span>
            </div>
            <form class="security_card_form" action="/security" method="POST">
                <div class="security_card_form_group">
                    <label class="security_card_form_group_label" for="email">Email Address</label>
                    <div class="security_card_form_group_input_container">
                        <i class="security_card_form_group_input_icon fa-regular fa-envelope"></i>
                        <input class="security_card_form_group_input" type="text" id="email" name="email"
                            placeholder="name@example.com">
                    </div>
                    <span class="security_card_form_group_error">This field is required</span>
                </div>
                <span class="security_card_form_error"></span>
                <button class="security_card_form_submit" type="submit">Send Reset Link</button>
                <div class="security_card_form_group security_card_form_footer">
                    <p class="security_card_text">Remember your password?</p>
                    <a href="index.html" class="security_card_link">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- script -->
    <script type="module" src="js/validation.js"></script>
    <script type="module" src="js/banner.js"></script>
    <script type="module" src="js/forgot-password.js"></script>
</body>

</html>
